<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do  cument</title>  
    <style>
        .fill{
            height: 100vh;
            width: 100vw;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    

<div class="fill"></div>



<svg  id="svg" width="1700" height="1200" xmlns="http://www.w3.org/2000/svg">
  <path d="M 0 80 Q 95 10 190 80" id="path" stroke="black" fill="transparent" />
</svg>


<div class="fill"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->
   
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
   
   <script>

  const path = document.querySelector("#path");
      const svg = document.querySelector("#svg");

  let w = parseInt( svg.getAttribute("width"))
      let h=parseInt( svg.getAttribute("height"))
  console.log(parseInt( svg.getAttribute("width")));

  
  w=window.screen.width
  svg.setAttribute("width",w)
//   console.log(svg.width);

    console.log(window.screen);
    
  
  path.setAttribute("d",`M 0 ${h/2} Q ${w/2} 1 ${w} ${h/2}`)



  svg.addEventListener("mousemove",(e)=>{

        //   path.setAttribute("d",`M 0 ${h/2} Q ${e.x} ${e.y} ${w} ${h/2}`)
         
            gsap.to("#path",{
                duration:1,
                attr: { d : `M 0 ${h/2} Q ${e.offsetX} ${e.offsetY} ${w} ${h/2}` }
            })

  })

  svg.addEventListener("mouseleave",(e)=>{

        //   path.setAttribute("d",`M 0 ${h/2} Q ${e.x} ${e.y} ${w} ${h/2}`)
         
            gsap.to("#path",{
                duration:2.5,
                    ease: "elastic.out(1,0.1)",
                attr: { d : `M 0 ${h/2} Q ${w/2} ${h/2} ${w} ${h/2}` }
            })

  })
    </script>
</body>
</html>
