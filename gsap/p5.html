<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            height: 100%;
            width: 100%;
        }
        .p{
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            

        }
        #page1{
            
            background-color: rgb(237, 112, 4);
        }
  #page2{
            background-color: rgb(4, 233, 237);
        }
  #page3{
            background-color: rgb(136, 237, 4);
        }
  #page4{
            background-color: rgb(4, 237, 136);
        }
        .box{
            height: 300px;
            width: 300px;
            background-color: rgb(46, 243, 7);
            border:black 2px solid;
        }

    </style>
 
</head>
<body>
    


    <div id="page1" class="p"><div class="box"></div></div>
    <div id="page2" class="p"><div class="box"></div></div>
    <div id="page3" class="p"><div class="box"></div></div>
    <div id="page4" class="p"><div class="box"></div></div>

<!-- ++++++++++++++++++++++++ Gsap cdn  +++++++++++++++++++++++++++++++ -->

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
<script>
gsap.from("#page1 .box",{
    scale:0,
    delay:1,
    duration:2,
    rotate:360,
    scrollTrigger:"#page1 .box"
})
gsap.from("#page2 .box",{
    scale:0,
    duration:2,
    rotate:360,
    scrollTrigger:{
        trigger:"#page2 .box",
        scroller:"body",
        markers:true,
        start:"top 60%",
        end: "top 40%" ,
        scrub: true
    }

})
gsap.from("#page3 .box",{
    scale:0,
    delay:1,
    duration:2,
    rotate:360,
    scrollTrigger:"#page3 .box"
})
gsap.from("#page4 .box",{
    scale:0,
    delay:1,
    duration:2,
    rotate:360,
    scrollTrigger:"#page4 .box"
})
</script>
</body>
</html>
