<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #box1{
        height: 300px;
        width: 300px;
        background-color: red;
    }
     #box2{
        height: 300px;
        width: 300px;
        background-color: greenyellow;
    } #box3{
        height: 300px;
        width: 300px;
        background-color: rgb(0, 203, 210);
    } #box4{
        height: 300px;
        width: 300px;
        background-color: rgb(255, 0, 225);
    }
</style>
<body>




<div id="box1"></div>
<div id="box2"></div>
<div id="box3"></div>
<div id="box4"></div>









    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script>
var tl = gsap.timeline()
 tl.to("#box1",{
    x:1200,
    duration:2,
    delay:2,
    rotate:360,
    repeat:-1,
    yoyo:true
    
 })
tl.to("#box2",{
    x:1200,
    duration:2,
    // delay:2
    
    
 })   
 tl.to("#box3",{
    x:1200,
    duration:2,
    // delay:2
    repeat:-1,
    yoyo:true
    
    
 })
 
 tl.to("#box4",{
    x:1200,
    duration:2,
    // delay:2
    
    
 })  
  </script>

</body>
</html>
